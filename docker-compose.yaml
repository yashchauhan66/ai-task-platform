
services:
 
 #redis service
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - redis-net

 
  #backend services
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - Secret_Key=${Secret_Key}
    depends_on:
      - redis
    networks:
      - redis-net

   #frontend service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"  
    depends_on:
      - backend
    networks:
      - redis-net

    #worker service
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - redis-net


volumes:
  redis-data: 

networks:
  redis-net:  