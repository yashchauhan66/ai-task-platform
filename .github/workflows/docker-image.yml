name: Docker Image CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/ai-task-backend:v1.0.${{ github.run_number }} ./Backend
          docker push  ${{secrets.DOCKER_USERNAME}}/ai-task-backend:v1.0.${{ github.run_number }}

      - name: Build and Push Frontend
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/ai-task-frontend:v1.0.${{ github.run_number }} ./frontend
          docker push  ${{secrets.DOCKER_USERNAME}}/ai-task-frontend:v1.0.${{ github.run_number }}

      - name: Build and Push Worker
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/ai-task-worker:v1.0.${{ github.run_number }} ./worker
          docker push  ${{secrets.DOCKER_USERNAME}}/ai-task-worker:v1.0.${{ github.run_number }}
